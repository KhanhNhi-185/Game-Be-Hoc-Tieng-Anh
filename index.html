<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 Bé Học Tiếng Anh</title>

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Bubblegum+Sans&display=swap"
        rel="stylesheet">

    <style>
        /* --- NÚT NHẠC --- */
        .fixed-music-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid white;
            background: #5f27cd;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .fixed-music-toggle.off {
            background: #8395a7;
        }

        /* --- LAYOUT CHÍNH --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: #a2d2ff;
            background-image:
                radial-gradient(#ffffff 10%, transparent 10%),
                radial-gradient(#ffffff 10%, transparent 10%);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px; /* Giảm padding lề ngoài trên mobile */
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px 20px;
            border-radius: 40px;
            border: 6px solid #ffafbd;
            box-shadow: 0 12px 0 #fb6f92;
            width: 100%;
            max-width: 900px;
            position: relative;
            z-index: 1;
        }

        h1 img {
            max-width: 100%;
            height: auto;
            max-height: 200px; /* Thu nhỏ chiều cao ảnh tiêu đề */
            object-fit: contain;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: clamp(16px, 4vw, 22px); /* Tự động co giãn font chữ */
            color: #4361ee;
            margin-bottom: 30px;
            font-weight: bold;
            padding: 0 10px;
        }

        /* --- HỆ THỐNG GRID TỰ THÍCH ỨNG --- */
        .games {
            display: grid;
            /* Trên điện thoại: 1 cột (1fr), Trên máy tính: 2 cột (1fr 1fr) */
            grid-template-columns: 1fr; 
            gap: 20px;
        }

        /* Khi màn hình lớn hơn 768px thì hiện 2 cột */
        @media(min-width: 768px) {
            .games {
                grid-template-columns: 1fr 1fr;
                gap: 30px;
            }
        }

        .game-card {
            background: #fff;
            border-radius: 30px;
            padding: 25px 15px;
            border: 5px solid #eeeeee;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-card:nth-child(1) { border-color: #ffcfd2; }
        .game-card:nth-child(2) { border-color: #cfdbff; }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .game-icon {
            font-size: clamp(50px, 10vw, 80px);
            margin-bottom: 10px;
        }

        .game-title {
            font-size: clamp(20px, 5vw, 28px);
            color: #ff477e;
            margin-bottom: 8px;
        }

        .game-desc {
            font-size: clamp(14px, 3.5vw, 17px);
            color: #666;
            line-height: 1.4;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .play-btn {
            display: inline-block;
            text-decoration: none;
            background: #4cc9f0;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 6px 0 #4361ee;
            transition: 0.1s;
            text-transform: uppercase;
            width: fit-content;
        }

        .play-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #4361ee;
        }

        /* TRANG TRÍ */
        .decoration {
            position: fixed;
            z-index: 0;
            pointer-events: none;
            opacity: 0.6;
        }

        @media(max-width: 600px) {
            .decoration { display: none; } 
        }
    </style>
</head>

<body>

    <button class="fixed-music-toggle off" id="musicBtn" onclick="toggleMusic()">🔇</button>

    <div class="decoration" style="top: 5%; left: 5%; font-size: 40px;">☁️</div>
    <div class="decoration" style="top: 10%; right: 5%; font-size: 50px;">☀️</div>

    <div class="container">
        <h1>
            <img src="Bé học tiếng Anh.png" alt="Bé học tiếng Anh">
        </h1>

        <p class="subtitle">Khám phá thế giới từ vựng màu sắc! 🌈</p>

        <div class="games">
            <!-- GAME 1 -->
            <div class="game-card" onclick="location.href='nhap.html'">
                <span class="game-icon">🦁</span>
                <div class="game-title"><b>Đuổi Hình Bắt Chữ</b></div>
                <div class="game-desc">Nhìn Emoji xinh,<br>đoán tên cực đỉnh!</div>
                <a href="nhap.html" class="play-btn">CHƠI LUÔN</a>
            </div>

            <!-- GAME 2 -->
            <div class="game-card" onclick="location.href='latthe.html'">
                <span class="game-icon">🧠</span>
                <div class="game-title"><b>Lật Thẻ Tìm Cặp</b></div>
                <div class="game-desc">Rèn trí nhớ siêu phàm,<br>tìm cặp hình tương ứng!</div>
                <a href="latthe.html" class="play-btn" style="background: #ff9f43; box-shadow: 0 6px 0 #e67e22;">CHƠI NGAY</a>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="audio/nhac1.mp3" type="audio/mpeg">
    </audio>

    <script>
        let isMusicPlaying = false;
        const music = document.getElementById("bgMusic");
        const musicBtn = document.getElementById("musicBtn");

        function toggleMusic() {
            if (isMusicPlaying) {
                music.pause();
                isMusicPlaying = false;
                musicBtn.innerHTML = "🔇";
                musicBtn.classList.add("off");
            } else {
                music.play().then(() => {
                    isMusicPlaying = true;
                    musicBtn.innerHTML = "🔊";
                    musicBtn.classList.remove("off");
                }).catch(e => console.log("Cần tương tác người dùng"));
            }
        }
    </script>

</body>
</html>
