<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 Bé Học Tiếng Anh</title>

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Bubblegum+Sans&display=swap"
        rel="stylesheet">

    <style>
        /* --- CSS MỚI CHO NÚT NHẠC GÓC TRÊN BÊN PHẢI --- */
        .fixed-music-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 4px solid white;
            background: #5f27cd;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .fixed-music-toggle:active {
            transform: scale(0.9);
        }

        .fixed-music-toggle.off {
            background: #8395a7;
        }

        /* --- GIỮ NGUYÊN CSS CŨ --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: #a2d2ff;
            background-image:
                radial-gradient(#ffffff 10%, transparent 10%),
                radial-gradient(#ffffff 10%, transparent 10%);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 50px;
            border: 8px solid #ffafbd;
            box-shadow: 0 15px 0 #fb6f92;
            width: 100%;
            max-width: 950px;
            position: relative;
            z-index: 1;
        }

        h1 {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1 img {
            max-width: 100%;
            height: auto;
            max-height: 500px;
            object-fit: contain;
        }

        .subtitle {
            font-size: 24px;
            color: #4361ee;
            margin-bottom: 40px;
            font-weight: bold;
        }

        .games {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .game-card {
            background: #fff;
            border-radius: 40px;
            padding: 30px;
            border: 5px solid #eeeeee;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            cursor: pointer;
        }

        .game-card:nth-child(1) {
            border-color: #ffcfd2;
        }

        .game-card:nth-child(2) {
            border-color: #cfdbff;
        }

        .game-card:hover {
            transform: scale(1.05) rotate(-2deg);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1);
        }

        .game-icon {
            font-size: 90px;
            margin-bottom: 15px;
            display: block;
            filter: drop-shadow(0 5px 0 #ddd);
        }

        .game-title {
            font-size: 35px;
            color: #ff477e;
            margin-bottom: 10px;
        }

        .game-desc {
            font-size: 18px;
            color: #666;
            line-height: 1.4;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .play-btn {
            display: inline-block;
            text-decoration: none;
            background: #4cc9f0;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 8px 0 #4361ee;
            transition: 0.1s;
            text-transform: uppercase;
        }

        .play-btn:hover {
            background: #4895ef;
        }

        .play-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #4361ee;
        }

        .decoration {
            position: fixed;
            z-index: 0;
            pointer-events: none;
            animation: floatAnim 4s ease-in-out infinite;
        }

        @keyframes floatAnim {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        @media(max-width: 600px) {
            h1 img { max-height: 120px; }
            .container { padding: 25px; border-radius: 30px; }
            .subtitle { font-size: 18px; }
            .fixed-music-toggle { width: 50px; height: 50px; font-size: 20px; }
        }
    </style>
</head>

<body>

    <!-- NÚT BẬT TẮT NHẠC -->
    <button class="fixed-music-toggle off" id="musicBtn" onclick="toggleMusic()">🔇</button>

    <div class="decoration" style="top: 10%; left: 5%; font-size: 60px;">☁️</div>
    <div class="decoration" style="top: 15%; right: 10%; font-size: 80px; animation-delay: 1s;">☀️</div>
    <div class="decoration" style="bottom: 10%; left: 8%; font-size: 70px; animation-delay: 2s;">🎈</div>
    <div class="decoration" style="bottom: 15%; right: 5%; font-size: 60px; animation-delay: 1.5s;">🎨</div>

    <div class="container">
        <h1>
            <img src="Bé học tiếng Anh.png" alt="Bé học tiếng Anh">
        </h1>

        <p class="subtitle">
            Cùng khám phá thế giới từ vựng đầy màu sắc nào! 🌈
        </p>

        <div class="games">
            <!-- GAME 1 -->
            <div class="game-card" onclick="location.href='nhap.html'">
                <span class="game-icon">🦁</span>
                <div class="game-title"><b>Đuổi Hình Bắt Chữ</b></div>
                <div class="game-desc">
                    Nhìn Emoji cực xinh, <br> đoán tên tiếng Anh cực đỉnh!
                </div>
                <a href="nhap.html" class="play-btn">CHƠI LUÔN</a>
            </div>

            <!-- GAME 2 -->
            <div class="game-card" onclick="location.href='latthe.html'">
                <span class="game-icon">🧠</span>
                <div class="game-title"><b>Lật Thẻ Tìm Cặp</b></div>
                <div class="game-desc">
                    Rèn luyện trí nhớ siêu phàm, <br> tìm cặp hình và chữ tương ứng!
                </div>
                <a href="latthe.html" class="play-btn" style="background: #ff9f43; box-shadow: 0 8px 0 #e67e22;">CHƠI NGAY</a>
            </div>
        </div>
    </div>

    <!-- AUDIO -->
    <audio id="bgMusic" loop>
        <source src="audio/nhac1.mp3" type="audio/mpeg">
    </audio>

    <script>
        let isMusicPlaying = false;
        const music = document.getElementById("bgMusic");
        const musicBtn = document.getElementById("musicBtn");

        function toggleMusic() {
            if (isMusicPlaying) {
                music.pause();
                isMusicPlaying = false;
                musicBtn.innerHTML = "🔇";
                musicBtn.classList.add("off");
            } else {
                music.play().then(() => {
                    isMusicPlaying = true;
                    musicBtn.innerHTML = "🔊";
                    musicBtn.classList.remove("off");
                }).catch(e => console.log("Cần tương tác người dùng để phát nhạc"));
            }
        }
    </script>

</body>

</html>
