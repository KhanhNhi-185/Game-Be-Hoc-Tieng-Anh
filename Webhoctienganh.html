<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Game Học Từ Vựng Tiếng Anh</title>

  <style>

    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#74ebd5,#ACB6E5);
      text-align:center;
      min-height:100vh;
      padding:20px;
    }

    .game-box{
      background:white;
      max-width:650px;
      margin:auto;
      padding:30px;
      border-radius:25px;
      box-shadow:0 0 20px rgba(0,0,0,0.2);
    }

    h1{
      color:#0077ff;
      margin-bottom:10px;
    }

    .emoji{
      font-size:110px;
      margin:20px 0;
      animation: bounce 1s infinite alternate;
    }

    @keyframes bounce{
      from{transform:translateY(0);}
      to{transform:translateY(-10px);}
    }

    .btn{
      width:200px;
      padding:15px;
      margin:10px;
      border:none;
      border-radius:15px;
      background:#0077ff;
      color:white;
      font-size:20px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#0056cc;
      transform:scale(1.05);
    }

    #message{
      font-size:25px;
      margin:15px;
      font-weight:bold;
      min-height:40px;
    }

    #score{
      font-size:22px;
      color:#333;
      margin-top:10px;
    }

    .info-box{
      background:#fff4c4;
      padding:20px;
      border-radius:20px;
      margin-top:20px;
      text-align:left;
    }

    .info-title{
      font-size:22px;
      color:#cc8800;
      margin-bottom:10px;
      font-weight:bold;
    }

    .speak-btn{
      background:#ff9800;
      color:white;
      border:none;
      padding:10px 20px;
      border-radius:12px;
      font-size:18px;
      cursor:pointer;
      margin-top:10px;
    }

    .speak-btn:hover{
      background:#e68900;
    }

    .progress{
      width:100%;
      background:#ddd;
      border-radius:20px;
      overflow:hidden;
      margin-top:20px;
    }

    .progress-bar{
      height:20px;
      width:0%;
      background:#00c853;
      transition:0.5s;
    }

  </style>
</head>

<body>

<div class="game-box">

  <h1>🎮 English Vocabulary Game</h1>

  <p>Chọn đáp án đúng với hình ảnh</p>

  <div class="emoji" id="emoji">🍎</div>

  <div id="buttons"></div>

  <div id="message"></div>

  <div id="score">⭐ Điểm: 0</div>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="info-box">

    <div class="info-title">
      📖 Thông tin từ vựng
    </div>

    <p><b>Từ:</b> <span id="word"></span></p>

    <p><b>Phiên âm:</b> <span id="pronunciation"></span></p>

    <p><b>Nghĩa:</b> <span id="meaning"></span></p>

    <p><b>Ví dụ:</b> <span id="example"></span></p>

    <button class="speak-btn" onclick="speakWord()">
      🔊 Nghe phát âm
    </button>

  </div>

</div>

<script>

const words = [

  {
    emoji:"🍎",
    correct:"Apple",
    pronunciation:"/ˈæp.əl/",
    meaning:"Quả táo",
    example:"I eat an apple every day.",
    options:["Apple","Dog","Book","Fish"]
  },

  {
    emoji:"🐶",
    correct:"Dog",
    pronunciation:"/dɒɡ/",
    meaning:"Con chó",
    example:"The dog is very cute.",
    options:["Cat","Milk","Dog","Car"]
  },

  {
    emoji:"📚",
    correct:"Book",
    pronunciation:"/bʊk/",
    meaning:"Quyển sách",
    example:"This book is interesting.",
    options:["Sun","Book","Fish","Apple"]
  },

  {
    emoji:"🚗",
    correct:"Car",
    pronunciation:"/kɑːr/",
    meaning:"Xe hơi",
    example:"My father drives a car.",
    options:["Car","Dog","Milk","Fish"]
  },

  {
    emoji:"☀️",
    correct:"Sun",
    pronunciation:"/sʌn/",
    meaning:"Mặt trời",
    example:"The sun is bright today.",
    options:["Fish","Sun","Apple","Cat"]
  }

];

let current = 0;
let score = 0;

function loadGame(){

  let word = words[current];

  document.getElementById("emoji").innerHTML =
    word.emoji;

  document.getElementById("word").innerHTML =
    word.correct;

  document.getElementById("pronunciation").innerHTML =
    word.pronunciation;

  document.getElementById("meaning").innerHTML =
    word.meaning;

  document.getElementById("example").innerHTML =
    word.example;

  let html = "";

  word.options.forEach(option => {

    html += `
      <button class="btn"
      onclick="checkAnswer('${option}')">
      ${option}
      </button>
    `;
  });

  document.getElementById("buttons").innerHTML =
    html;

  updateProgress();
}

function checkAnswer(answer){

  if(answer === words[current].correct){

    document.getElementById("message").innerHTML =
      "🎉 Chính xác!";

    score++;

  }else{

    document.getElementById("message").innerHTML =
      "❌ Sai rồi!";
  }

  document.getElementById("score").innerHTML =
    "⭐ Điểm: " + score;

  setTimeout(() => {

    current++;

    if(current < words.length){

      loadGame();

      document.getElementById("message").innerHTML =
        "";

    }else{

      alert(
        "🎊 Hoàn thành trò chơi!\n\n"
        + "Điểm của bạn: "
        + score + "/" + words.length
      );

      current = 0;
      score = 0;

      loadGame();

      document.getElementById("score").innerHTML =
        "⭐ Điểm: 0";

      document.getElementById("message").innerHTML =
        "";
    }

  },1200);
}

function speakWord(){

  let text = words[current].correct;

  let speech = new SpeechSynthesisUtterance(text);

  speech.lang = "en-US";

  speech.rate = 0.9;

  window.speechSynthesis.speak(speech);
}

function updateProgress(){

  let percent =
    ((current) / words.length) * 100;

  document.getElementById("progressBar").style.width =
    percent + "%";
}

loadGame();

</script>

</body>
</html>
