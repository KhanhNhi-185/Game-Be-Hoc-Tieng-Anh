<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 Lật thẻ tìm cặp</title>

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Bubblegum+Sans&display=swap"
        rel="stylesheet">

    <style>
        /* CSS giữ nguyên, thêm một chút cho nút nhạc */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Quicksand', sans-serif;
            background: #a2d2ff;
            background-image: radial-gradient(#ffffff 10%, transparent 10%), radial-gradient(#ffffff 10%, transparent 10%);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            background: white; width: 100%; max-width: 900px; padding: 30px;
            border-radius: 50px; text-align: center; border: 8px solid #ffafbd;
            box-shadow: 0 15px 0 #fb6f92; position: relative;
        }
        h1 img { max-width: 100%; height: auto; max-height: 120px; object-fit: contain; margin-bottom: 20px;}
        .stat-box {
            background: #fff3e0; padding: 12px 25px; border-radius: 20px;
            font-weight: 900; color: #f39c12; font-size: 22px;
            box-shadow: 0 5px 0 #ffe0b2; margin: 0 10px 20px; display: inline-block;
        }
        .memory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; perspective: 1000px; }
        .card { height: 150px; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; justify-content: center; align-items: center; border-radius: 25px; box-shadow: 0 6px 0 #ddd; }
        .card-front { background: #4cc9f0; color: white; font-size: 60px; }
        .card-back { background: #fff; color: #333; transform: rotateY(180deg); border: 5px solid #4cc9f0; font-size: 50px; font-weight: bold; padding: 10px; word-break: break-word; }
        .card.text-type .card-back { font-size: 28px; color: #7209b7; font-family: 'Bubblegum Sans', cursive; }
        .card.matched .card-back { background: #4caf50; border-color: #2e7d32; color: white; animation: bounceMatched 0.5s; }
        @keyframes bounceMatched { 0%, 100% { transform: rotateY(180deg) scale(1); } 50% { transform: rotateY(180deg) scale(1.1); } }
        .control-buttons { display: flex; justify-content: center; gap: 15px; margin-top: 30px; flex-wrap: wrap; }
        .control-btn { border: none; padding: 15px 25px; border-radius: 50px; color: rgb(255, 255, 255); font-size: 18px; font-weight: 700; cursor: pointer; box-shadow: 0 6px 0 rgba(0, 0, 0, 0.2); transition: 0.2s; }
        .restart-btn { background: #ff9f43; }
        .home-btn { background: #341f97; }
        .music-btn { background: #5f27cd; min-width: 140px; }
        .control-btn:active { transform: translateY(3px); box-shadow: none; }
        @media(max-width: 600px) { .memory-grid { grid-template-columns: repeat(3, 1fr); } .card { height: 110px; } }
    </style>
</head>

<body>
    <div class="game-container">
        <h1><img src="lật thẻ tìm cặp.png" alt="Lật thẻ tìm cặp"></h1>
        <div>
            <div class="stat-box" id="moves">Lượt: 0</div>
            <div class="stat-box" id="score">Điểm: 0</div>
        </div>
        <div class="memory-grid" id="gameBoard"></div>
        <div class="control-buttons">
            <button class="control-btn restart-btn" onclick="startGame()">🔄 Chơi lại</button>
            <button class="control-btn home-btn" onclick="goHome()">🏠 Quay lại</button>
            <button class="control-btn music-btn" onclick="toggleMusic()" id="musicBtn">🔊 Tắt nhạc</button>
        </div>
    </div>

    <!-- Nhạc nền -->
    <audio id="bgMusic" loop>
        <source src="audio/nhac1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const library = [
            { e: "🍎", t: "Apple" }, { e: "🦁", t: "Lion" }, { e: "🚗", t: "Car" },
            { e: "☀️", t: "Sun" }, { e: "🐶", t: "Dog" }, { e: "🍦", t: "Ice Cream" },
            { e: "🐘", t: "Elephant" }, { e: "🍌", t: "Banana" }, { e: "🐝", t: "Bee" },
            { e: "🦋", t: "Butterfly" }, { e: "✈️", t: "Plane" }, { e: "🌈", t: "Rainbow" },
            { e: "🐱", t: "Cat" }, { e: "🍇", t: "Grapes" }, { e: "🐢", t: "Turtle" },
            { e: "🦉", t: "Owl" }, { e: "🥦", t: "Broccoli" }, { e: "🍓", t: "Strawberry" },
            { e: "🚀", t: "Rocket" }, { e: "🌙", t: "Moon" }, { e: "🐠", t: "Fish" },
            { e: "🐥", t: "Chicken" }, { e: "🍉", t: "Watermelon" }, { e: "🐼", t: "Panda" },
            { e: "🦄", t: "Unicorn" }, { e: "⚽", t: "Ball" }, { e: "🚲", t: "Bike" },
            { e: "🏠", t: "House" }, { e: "🌳", t: "Tree" }, { e: "🌻", t: "Flower" },
            { e: "🦀", t: "Crab" }, { e: "🍄", t: "Mushroom" }, { e: "🐧", t: "Penguin" },
            { e: "🍕", t: "Pizza" }, { e: "🍔", t: "Burger" }, { e: "🎸", t: "Guitar" },
            { e: "🎁", t: "Gift" }, { e: "🎈", t: "Balloon" }, { e: "🧸", t: "Teddy" },
            { e: "🔔", t: "Bell" }
        ];

        let flippedCards = [];
        let matchedCount = 0;
        let moves = 0;
        let score = 0;
        let canFlip = true;
        let isMusicPlaying = false;
        const CARDS_PER_GAME = 6;

        const bgMusic = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        const duolingoSound = new Audio("https://www.myinstants.com/media/sounds/duolingo-correct.mp3");

        // --- XỬ LÝ NHẠC NỀN ---
        function toggleMusic() {
            if (bgMusic.paused) {
                playMusic();
            } else {
                pauseMusic();
            }
        }

        function playMusic() {
            bgMusic.play().then(() => {
                isMusicPlaying = true;
                musicBtn.innerText = "🔊 Tắt nhạc";
                musicBtn.style.background = "#5f27cd";
            }).catch(err => console.log("Cần tương tác để phát nhạc"));
        }

        function pauseMusic() {
            bgMusic.pause();
            isMusicPlaying = false;
            musicBtn.innerText = "🔇 Bật nhạc";
            musicBtn.style.background = "#8395a7";
        }

        function playSuccessSound() {
            duolingoSound.currentTime = 0;
            duolingoSound.play().catch(e => {});
        }

        function startGame() {
            if (isMusicPlaying) playMusic(); 

            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';
            flippedCards = [];
            matchedCount = 0;
            moves = 0;
            score = 0;
            canFlip = true;
            document.getElementById('moves').innerText = `Lượt: ${moves}`;
            document.getElementById('score').innerText = `Điểm: ${score}`;

            const shuffledLib = [...library].sort(() => Math.random() - 0.5);
            const selectedItems = shuffledLib.slice(0, CARDS_PER_GAME);

            const cardData = [];
            selectedItems.forEach(item => {
                cardData.push({ content: item.e, matchId: item.t, type: 'emoji' });
                cardData.push({ content: item.t, matchId: item.t, type: 'text' });
            });

            cardData.sort(() => Math.random() - 0.5);

            cardData.forEach((data) => {
                const card = document.createElement('div');
                card.classList.add('card');
                if(data.type === 'text') card.classList.add('text-type');
                card.dataset.matchId = data.matchId;

                card.innerHTML = `
                    <div class="card-face card-front">❓</div>
                    <div class="card-face card-back">${data.content}</div>
                `;

                card.addEventListener('click', () => {
                    // Tự động phát nhạc ở lần click đầu tiên nếu trình duyệt chặn
                    if (bgMusic.paused && musicBtn.innerText === "🔊 Tắt nhạc") {
                        playMusic();
                    }
                    flipCard(card);
                });
                gameBoard.appendChild(card);
            });
        }

        function flipCard(card) {
            if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').innerText = `Lượt: ${moves}`;
                checkMatch();
            }
        }

        function checkMatch() {
            canFlip = false;
            const [card1, card2] = flippedCards;
            const isMatch = card1.dataset.matchId === card2.dataset.matchId;

            if (isMatch) {
                setTimeout(() => {
                    playSuccessSound();
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    score += 10;
                    document.getElementById('score').innerText = `Điểm: ${score}`;
                    matchedCount++;
                    flippedCards = [];
                    canFlip = true;
                    setTimeout(() => speak(card1.dataset.matchId), 800); /*Khoảng thời gian giữa âm thanh duolingo và giọng đọc*/

                    if (matchedCount === CARDS_PER_GAME) {
                        setTimeout(() => alert("🎉 Xuất sắc!"), 800);
                    }
                }, 400);
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }

        function speak(word) {
            window.speechSynthesis.cancel();
            let speech = new SpeechSynthesisUtterance(word);
            speech.lang = "en-US";
            speech.rate = 0.8;
            window.speechSynthesis.speak(speech);
        }

        function goHome() { window.location.href = "index.html"; }

        // Khởi tạo game
        startGame();
    </script>
</body>
</html>
